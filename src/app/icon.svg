<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Emerald to Lime gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#84cc16" />
    </linearGradient>
    
    <!-- Connection lines gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#84cc16" />
    </linearGradient>
  </defs>

  <!-- Smooth, modern curved connecting paths (crawling tree links) -->
  <g fill="none" stroke-linecap="round">
    <!-- Root to Left Child -->
    <path d="M 256 110 C 256 185, 160 185, 160 260" stroke="url(#lineGrad)" stroke-width="16" />
    <!-- Root to Right Child -->
    <path d="M 256 110 C 256 185, 352 185, 352 260" stroke="url(#lineGrad)" stroke-width="16" />
    
    <!-- Left Child to Grandchildren -->
    <path d="M 160 260 C 160 330, 90 330, 90 400" stroke="url(#lineGrad)" stroke-width="12" />
    <path d="M 160 260 C 160 330, 230 330, 230 400" stroke="url(#lineGrad)" stroke-width="12" />
    
    <!-- Right Child to Grandchildren -->
    <path d="M 352 260 C 352 330, 310 330, 310 400" stroke="url(#lineGrad)" stroke-width="12" />
    <path d="M 352 260 C 352 330, 422 330, 422 400" stroke="url(#lineGrad)" stroke-width="12" />
  </g>

  <!-- Nodes representation -->
  <!-- Level 2 (Grandchildren Nodes) -->
  <circle cx="90" cy="400" r="24" fill="#09090b" stroke="url(#glowGrad)" stroke-width="8" />
  <circle cx="230" cy="400" r="24" fill="#09090b" stroke="url(#glowGrad)" stroke-width="8" />
  <circle cx="310" cy="400" r="24" fill="#09090b" stroke="url(#glowGrad)" stroke-width="8" />
  <circle cx="422" cy="400" r="24" fill="#09090b" stroke="url(#glowGrad)" stroke-width="8" />

  <!-- Level 1 (Child Nodes) -->
  <circle cx="160" cy="260" r="32" fill="#09090b" stroke="url(#glowGrad)" stroke-width="10" />
  <circle cx="352" cy="260" r="32" fill="#09090b" stroke="url(#glowGrad)" stroke-width="10" />

  <!-- Level 0 (Root Node - Central Seed) -->
  <circle cx="256" cy="110" r="44" fill="url(#glowGrad)" />
  <circle cx="256" cy="110" r="20" fill="#09090b" />
</svg>
